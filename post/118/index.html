              <p>1.到枣阳去了一趟，从火车上看去，一路上风景真的不错啊。到处是一片绿色，农民刚刚把水稻插上，不过枣阳大部分地区麦子还没有收割完，看来枣阳应该说气候更象河南，这个时候，大部分湖北地区的收割工作已经完成了。我家里的水稻早在半个月前已经都插到地里去了。<br>
真想好好玩几天啊 都没有时间 去亲近自然 人长大了，在外面跑 都没有一点点时间回家看看…</p>
