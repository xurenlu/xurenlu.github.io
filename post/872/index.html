            <h2 class="post-title">新版的gnome-do 巨爽啊。</h2>
            <div class="post-date">2009-04-25</div>
            
            <div class="post-content" v-pre>
              <p>我装了ubuntu 9.04,这上面的gnome-do是0.8.1.3的了，换皮肤时发现有一个叫docky的皮肤，用上之后具有 mac的dock效果，并且这个dock的高度的调整什么的用鼠标拖就行了，删除图标是拖出去就行了，添加则是在搜索时点图标左边的小加号。 很爽。这是我见过的最酷的linux程序了。虽然已经很炫，可是这套简洁的皮肤美观而不花哨，可通过插件扩展所以功能强大，快捷键操作又极为方便。很爽。</p>
