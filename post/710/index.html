              <p>哈。 用了很久的fedora,因为升级失败，而放弃了。 关键是，我的本本必须用来工作，所以不能等着fedora 修正这些个错误。所以直接换成ubuntu了 还有一个原因是，fedora的国内源太少了，国外的源又太慢。我装了ubuntu后，用上海交大的源，在公司升级最高可到4M的速度，升级整个系统也要不了多久。 好好体验体验。</p>
