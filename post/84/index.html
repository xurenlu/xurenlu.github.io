              <p>屁股能决定什么？<br>
据说，现在的铁路的宽度，是由马的屁股决定的。因为最初的铁路是用的马车轮子，而马车轮子的宽度，乃是由两匹马的屁股的宽度之和来决定的。<br>
记得曾经看过一个笑话，说有人的手机不小心掉到马桶里去了，于是该用户非常生气，认为手机生产商应该造马桶盖那么大的手机，这样就不会掉到马桶里了。而马桶盖的大小，乃是由人的屁屁的大小决定的，这么说来，手机的大小，竟是由人的屁屁的大小来决定的了。<br>
搞it的，能否成功，有时也决定于他的屁股是否坐得住吧!</p>
