          <div class="post-content">
            <p>偶的这个本本的键盘又坏了一次。 上次的本是F2键不好使，这次是Enter键。 我给海尔客服打了电话，说，为了全面检测一下，需要我把电脑搬到东三环一个写字楼去修。我决定自己修一下。反正弄坏了也不会丢数扰。 最终我又给修好了。维修过程是： 猛击Enter键数次。 用指甲抠Enter键数次。 略掀开Enter键，猛吸一口仙气，吹之。如是十次。 检测结果：Enter工作恢复正常～＠！</p>
