            <div class="post-content" v-pre>
              <p>经过一段时间的学习，我的顿悟： 互联网产品经理有三个层次: 第一个层次是：价值 。推出亚马逊的S3服务这个产品的产品经理，做的是价值。 第二个层次是：功能。同是做IM,QQ的不仅能视频，能远程指导，MSN的只能视频不能远程指导。QQ的产品经理做的是功能。 第三个功能是：细节。据说，百度有啊的页面，用户易用性比淘宝的好。这，是细节。 用户看得到的，是功能和细节。但是做为产品经理，我们要时刻记住我们要创造什么样的价值。</p>
