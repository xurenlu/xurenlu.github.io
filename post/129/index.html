              <p>春天<br>
一批嫩绿的生命悄悄萌生<br>
一批生命却在走向死亡<br>
还有一批生命<br>
便在空虚中默然林立</p>
<p>据说春天是一个复杂的季节<br>
有些事务我们永远无法弄清它<br>
春天的爱情便是一例<br>
我不知道它会在什么时候<br>
以一种什么方式终结<br>
一如那新绿的嫩芽<br>
我不清楚它是怎样萌发<br>
成长、并走向死亡</p>
<p>似乎曾经有人<br>
告诉我春雷其实<br>
是冬留下的沉重的叹息<br>
或许这只是我自己的幻觉<br>
—-其实连我自己也迷茫<br>
我无法从这叹息声中<br>
推知去年那批幼芽的去向</p>
