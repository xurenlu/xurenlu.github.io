            <div class="post-content" v-pre>
              <p>突然想到，在javascript中,window.top对象只有这两种状态: 1.可读可写: 就是当iframe的框架外页和内页处于同一域内时; 2.只可写不可读： 就是当iframe的框架外页和内页处于不同域内时; 嗯，原来设计东西的时候总是认为一般情况有写权限时就一定有读权限....误区啊。</p>
