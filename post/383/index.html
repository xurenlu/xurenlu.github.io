              <p>有如此好的忘性，也真是难得<br>
今天搞了很糗的事：<br>
早上上班时，忘了带钱包。而老婆我也不让她带钱，结果两人中午没钱吃饭。<br>
找同事借了钱，没料到下班时，忘在公司了。<br>
快到家时，到菜市场买菜，菜拿到手里，才想起来，两人都没钱。<br>
这忘性真不是一般的好。</p>
