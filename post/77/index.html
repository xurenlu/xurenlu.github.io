              <p>今天早上去找了吴虎</p>
<p>他说我需要缴纳4000的赔偿金</p>
<p>因为在试用期内，不需要缴纳违约金10000元，但是这4000元是为了招录我个人而产生的费用，理应由我来赔偿。但是，我问他这个金额4000是怎么算的，他说这是公司规定。我无法认可。</p>
<p>公司招聘的时候，是自己开车去我们学校去的，就半天时间而已，不需要坐飞机赶过来，也没有租用任何展位，我觉得它无法证明确实为了招聘我花了4000元。</p>
<p>下一步，申请劳动仲裁吧。</p>
