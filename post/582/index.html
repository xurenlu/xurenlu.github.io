            <div class="post-content" v-pre>
              <p>呵呵，终于休息一天了 大概从进入十二月起，就一直没休息，一周七天地连轴转，天天干到十点半。 今天因为到年底了，要把所有要报销的车票交上去，才整理了一下我所有的车票，发现我基本上没有在晚上十点以前离开公司的，最常见的离开公司时间是22:40。 明天终于可以休息一天了。 今天头儿很兴奋地过来跟我说：元旦可以休息了。 奇怪的是，我倒是好像习惯了这种日子，天天就像机械一样按点去公司，按点儿回家。 应该年后就会轻松一点儿了。</p>
